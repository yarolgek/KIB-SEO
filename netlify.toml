[build]
  command = "npm run build"
  publish = "_site"

[build.environment]
  NODE_VERSION = "20"

[context.deploy-preview]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

[[redirects]]
  from = "/contact"
  to = "/kontakt/"
  status = 301

[[redirects]]
  from = "/contact/"
  to = "/kontakt/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/ueber-uns/"
  status = 301

[[redirects]]
  from = "/about/"
  to = "/ueber-uns/"
  status = 301

[[redirects]]
  from = "/privacy"
  to = "/datenschutz/"
  status = 301

[[redirects]]
  from = "/privacy/"
  to = "/datenschutz/"
  status = 301

[[redirects]]
  from = "/imprint"
  to = "/impressum/"
  status = 301

[[redirects]]
  from = "/imprint/"
  to = "/impressum/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://esm.sh; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://images.unsplash.com https://www.google-analytics.com https://www.googletagmanager.com; font-src 'self'; connect-src 'self' https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com https://*.supabase.co https://esm.sh; upgrade-insecure-requests"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
